<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>沖繩 6D5N 旅遊戰術手冊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }
        .day-tab.active { 
            background-color: #2563eb; 
            color: white; 
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }
        .scroll-hide::-webkit-scrollbar { display: none; }
        .card-shadow { box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05); }
        .timeline-line { position: absolute; left: 24px; top: 0; bottom: 0; width: 2px; background: linear-gradient(to bottom, #e2e8f0, #cbd5e1, #e2e8f0); }
        .status-badge { background: rgba(37, 99, 235, 0.1); color: #1d4ed8; border: 1px solid rgba(37, 99, 235, 0.2); }
    </style>
</head>
<body class="max-w-md mx-auto bg-slate-50 min-h-screen pb-24">

    <!-- Header -->
    <header class="bg-blue-600 text-white px-6 py-8 rounded-b-[2rem] shadow-lg sticky top-0 z-50">
        <div class="flex justify-between items-start">
            <div>
                <h1 class="text-2xl font-black flex items-center gap-2">
                    <i data-lucide="palmtree"></i> OKINAWA 6D5N
                </h1>
                <p class="text-blue-100 text-sm mt-1 opacity-90">沖繩專屬行程・手機隨身版</p>
            </div>
            <div class="bg-white/20 backdrop-blur-md p-2 rounded-xl text-center min-w-[70px]">
                <span class="block text-[10px] uppercase font-bold tracking-wider">Today</span>
                <span class="text-lg font-bold">5/24</span>
            </div>
        </div>
    </header>

    <!-- Day Selector -->
    <nav class="sticky top-[108px] z-40 bg-slate-50/80 backdrop-blur-md py-4 overflow-x-auto scroll-hide">
        <div class="flex gap-3 px-6 min-w-max">
            <button onclick="showDay(1)" id="tab-1" class="day-tab px-6 py-2.5 rounded-2xl text-sm font-bold text-slate-500 bg-white border border-slate-100 shadow-sm transition-all active">Day 1</button>
            <button onclick="showDay(2)" id="tab-2" class="day-tab px-6 py-2.5 rounded-2xl text-sm font-bold text-slate-500 bg-white border border-slate-100 shadow-sm transition-all">Day 2</button>
            <button onclick="showDay(3)" id="tab-3" class="day-tab px-6 py-2.5 rounded-2xl text-sm font-bold text-slate-500 bg-white border border-slate-100 shadow-sm transition-all">Day 3</button>
            <button onclick="showDay(4)" id="tab-4" class="day-tab px-6 py-2.5 rounded-2xl text-sm font-bold text-slate-500 bg-white border border-slate-100 shadow-sm transition-all">Day 4</button>
            <button onclick="showDay(5)" id="tab-5" class="day-tab px-6 py-2.5 rounded-2xl text-sm font-bold text-slate-500 bg-white border border-slate-100 shadow-sm transition-all">Day 5</button>
            <button onclick="showDay(6)" id="tab-6" class="day-tab px-6 py-2.5 rounded-2xl text-sm font-bold text-slate-500 bg-white border border-slate-100 shadow-sm transition-all">Day 6</button>
        </div>
    </nav>

    <!-- Content -->
    <main id="itinerary-content" class="px-6 relative">
        <!-- Content will be injected here -->
    </main>

    <!-- Navigation Footer -->
    <footer class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm bg-slate-900/90 backdrop-blur-xl rounded-3xl p-4 flex justify-around items-center shadow-2xl z-50">
        <a href="https://www.google.com/maps/search/?api=1&query=TISSAGE+HOTEL+NAHA+by+NEST" target="_blank" class="flex flex-col items-center text-slate-400 hover:text-white">
            <i data-lucide="home" class="w-6 h-6 mb-1"></i>
            <span class="text-[10px] font-bold">回飯店</span>
        </a>
        <div class="h-8 w-[1px] bg-slate-700"></div>
        <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="flex flex-col items-center text-white">
            <i data-lucide="arrow-up-circle" class="w-8 h-8"></i>
        </button>
        <div class="h-8 w-[1px] bg-slate-700"></div>
        <a href="https://www.google.com/maps/dir/?api=1&destination=Naha+Airport" target="_blank" class="flex flex-col items-center text-slate-400 hover:text-white">
            <i data-lucide="plane" class="w-6 h-6 mb-1"></i>
            <span class="text-[10px] font-bold">去機場</span>
        </a>
    </footer>

    <script>
        const itineraryData = {
            1: {
                title: "5/24 (日): 抵達與開胃鰻魚",
                status: "🚫 本日不需要用車",
                events: [
                    { time: "18:00", name: "那霸機場抵達", type: "transport", info: "入境及領取行李", duration: "1h" },
                    { time: "19:00", name: "機場 ➔ 飯店", type: "transport", info: "🚕 推薦搭計程車 (約1500円/10min)", map: "https://www.google.com/maps/dir/?api=1&origin=Naha+Airport&destination=TISSAGE+HOTEL+NAHA+by+NEST" },
                    { time: "19:15", name: "飯店 Check-in", type: "stay", info: "🏨 TISSAGE HOTEL NAHA by NEST", duration: "30m" },
                    { time: "20:00", name: "鰻の成瀬 (國際通)", type: "food", info: "🍽️ 炭火香氣十足，推薦生啤酒！", map: "https://www.google.com/maps/search/?api=1&query=鰻の成瀬+那覇国際通り店", duration: "1.5h" },
                    { time: "21:45", name: "MaxValu 24H超市", type: "shop", info: "🛒 採買宵夜與隔日飲水", map: "https://www.google.com/maps/search/?api=1&query=MaxValu+Makishi", duration: "45m" }
                ]
            },
            2: {
                title: "5/25 (一): 狂掃限定商品",
                status: "🚗 租車首日 (飯店旁取車)",
                events: [
                    { time: "10:00", name: "泊港魚市場", type: "food", info: "🍣 必吃生魚片與海膽烤龍蝦", map: "https://www.google.com/maps/search/?api=1&query=Tomari+Iyumachi+Fish+Market", duration: "1h" },
                    { time: "11:15", name: "Main Place", type: "shop", info: "🐹 Chiikawa Land 限定款就在這！", map: "https://www.google.com/maps/search/?api=1&query=San-A+Naha+Main+Place", duration: "1.5h" },
                    { time: "13:00", name: "Sports Depo", type: "shop", info: "👟 專門掃 Mizuno、Salomon 鞋款", map: "https://www.google.com/maps/search/?api=1&query=Sports+Depo+Ameku", duration: "1.5h" },
                    { time: "14:45", name: "PARCO CITY", type: "shop", info: "🛍️ 超美海景商場，適合長待", map: "https://www.google.com/maps/search/?api=1&query=SAN-A+URASOE+WEST+COAST+PARCO+CITY", duration: "3.5h" },
                    { time: "19:00", name: "和牛燒肉 ROINS", type: "food", info: "🥩 高質感和牛，建議先訂位", map: "https://www.google.com/maps/search/?api=1&query=Roins+Yakiniku+Naha", duration: "2h" }
                ]
            },
            3: {
                title: "5/26 (二): 古宇利大橋之旅",
                status: "🚗 自駕北部行程 (需ETC)",
                events: [
                    { time: "10:30", name: "Captain Kangaroo", type: "food", info: "🍔 沖繩最強漢堡！務必提早寫位", map: "https://www.google.com/maps/search/?api=1&query=Captain+Kangaroo+Nago", duration: "2h" },
                    { time: "12:45", name: "古宇利島 (心形岩)", type: "stay", info: "📸 必拍跨海大橋與心形岩", map: "https://www.google.com/maps/search/?api=1&query=Heart+Rock+Kouri+Island", duration: "1.5h" },
                    { time: "14:45", name: "備瀨福木林道", type: "stay", info: "🚲 騎單車穿梭療癒綠色隧道", map: "https://www.google.com/maps/search/?api=1&query=Bise+no+Fukugi+Tree+Road", duration: "1.5h" },
                    { time: "19:00", name: "鳥貴族串燒", type: "food", info: "🍢 全均一價，大口吃肉喝酒", map: "https://www.google.com/maps/search/?api=1&query=Torikizoku+Naha", duration: "2h" }
                ]
            },
            4: {
                title: "5/27 (三): 貓咪與最大商場",
                status: "🚗 中南部自駕行程",
                events: [
                    { time: "10:00", name: "奧武島 (貓島)", type: "stay", info: "🐈 坐在海堤吃中本天婦羅找貓", map: "https://www.google.com/maps/search/?api=1&query=Ojima+Island+Nakamoto+Tempura", duration: "1.5h" },
                    { time: "12:15", name: "AEON Rycom 來客夢", type: "shop", info: "🛍️ 全島最大，藥妝最後補貨", map: "https://www.google.com/maps/search/?api=1&query=AEON+Mall+Okinawa+Rycom", duration: "4.5h" },
                    { time: "17:30", name: "迴轉壽司市場", type: "food", info: "🍣 美國村必吃人氣壽司店", map: "https://www.google.com/maps/search/?api=1&query=Gourmet+Sushi+Market+Mihama", duration: "1.5h" }
                ]
            },
            5: {
                title: "5/28 (四): 瀨長島飛機景觀",
                status: "🚗 還車日 (記得加滿油)",
                events: [
                    { time: "10:30", name: "瀨長島小希臘", type: "stay", info: "✈️ 看飛機起降，吃幸福鬆餅", map: "https://www.google.com/maps/search/?api=1&query=Umikaji+Terrace+Senagajima", duration: "2.5h" },
                    { time: "13:30", name: "Ashibinaa Outlet", type: "shop", info: "👜 運動精品最後折扣大掃貨", map: "https://www.google.com/maps/search/?api=1&query=Okinawa+Outlet+Mall+Ashibinaa", duration: "3h" },
                    { time: "17:15", name: "還車辦理", type: "transport", info: "⛽ 加滿油、保存收據備查", duration: "30m" }
                ]
            },
            6: {
                title: "5/29 (五): 神社祈福與歸途",
                status: "🚶 漫步與單軌行程",
                events: [
                    { time: "09:45", name: "波上宮", type: "stay", info: "⛩️ 琉球八社之首，求個御守", map: "https://www.google.com/maps/search/?api=1&query=Naminoue+Shrine", duration: "1h" },
                    { time: "11:00", name: "傑克牛排館", type: "food", info: "🥩 懷舊美式風味，老字號名店", map: "https://www.google.com/maps/search/?api=1&query=Jack's+Steak+House+Naha", duration: "1.5h" },
                    { time: "12:45", name: "漫畫倉庫 (赤嶺店)", type: "shop", info: "🧸 挖寶聖地，尋找限定玩偶", map: "https://www.google.com/maps/search/?api=1&query=Manga+Souko+Akamine", duration: "2.5h" },
                    { time: "16:30", name: "機場報到", type: "transport", info: "🍱 買飯糰帶上機當晚餐", duration: "2h" }
                ]
            }
        };

        const typeStyles = {
            transport: { icon: 'car-front', color: 'text-blue-600', bg: 'bg-blue-100' },
            food: { icon: 'utensils', color: 'text-orange-600', bg: 'bg-orange-100' },
            shop: { icon: 'shopping-bag', color: 'text-purple-600', bg: 'bg-purple-100' },
            stay: { icon: 'camera', color: 'text-emerald-600', bg: 'bg-emerald-100' }
        };

        function showDay(dayNum) {
            document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${dayNum}`).classList.add('active');

            const day = itineraryData[dayNum];
            const container = document.getElementById('itinerary-content');
            
            let html = `
                <div class="mt-8 mb-6 animate-in slide-in-from-right-4 duration-300">
                    <h2 class="text-xl font-black text-slate-800 leading-tight">${day.title}</h2>
                    <div class="mt-2 flex items-center gap-2">
                        <span class="status-badge px-2.5 py-0.5 rounded-full text-[10px] font-bold tracking-wide">${day.status}</span>
                    </div>
                </div>
                <div class="relative">
                    <div class="timeline-line"></div>
            `;

            day.events.forEach((event, idx) => {
                const style = typeStyles[event.type];
                html += `
                    <div class="relative pl-14 mb-8">
                        <div class="absolute left-0 top-1 w-12 h-12 ${style.bg} rounded-2xl flex items-center justify-center z-10 border-4 border-slate-50 shadow-sm">
                            <i data-lucide="${style.icon}" class="w-6 h-6 ${style.color}"></i>
                        </div>
                        <div class="bg-white p-5 rounded-[1.5rem] card-shadow border border-slate-100 active:scale-95 transition-all">
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-xs font-black text-slate-400 uppercase tracking-widest">${event.time}</span>
                                ${event.duration ? `<span class="text-[10px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded-lg font-bold">停留 ${event.duration}</span>` : ''}
                            </div>
                            <h3 class="font-bold text-slate-900 text-lg mb-1 leading-tight">${event.name}</h3>
                            <p class="text-slate-500 text-sm mb-4 leading-relaxed">${event.info}</p>
                            ${event.map ? `
                                <a href="${event.map}" target="_blank" class="flex items-center justify-center gap-2 w-full py-3 bg-slate-900 text-white text-[11px] font-black rounded-xl shadow-md uppercase tracking-wider active:bg-blue-600 transition-colors">
                                    <i data-lucide="map-pin" class="w-3.5 h-3.5"></i> 開啟地圖定位
                                </a>
                            ` : ''}
                        </div>
                    </div>
                `;
            });

            html += `</div>`;
            container.innerHTML = html;
            lucide.createIcons();
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        window.onload = () => {
            showDay(1);
            lucide.createIcons();
        };
    </script>
</body>
</html>
